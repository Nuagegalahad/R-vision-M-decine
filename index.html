<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Ma Révision Médicale</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&display=swap');

:root {
  --cream:   #FFF8F0;
  --coral:   #E05A5A;
  --coral2:  #F07070;
  --navy:    #D4788A;
  --navy2:   #D4788A;
  --blue:    #F0A0B0;
  --green:   #4CAF82;
  --border:  #E8D5C4;
  --card-bg: #FFFCF8;
  --text:    #2E1A1A;
  --muted:   #8A7A6A;
  --white:   #FFFFFF;
  --r-lg:    20px;
  --r-md:    14px;
  --r-sm:    10px;
  --shadow:  0 4px 20px rgba(196,96,122,0.10);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  background-color: var(--cream);
  min-height: 100vh;
  font-family: 'Baloo 2', cursive;
  color: var(--text);
  padding-bottom: 60px;
  overflow-x: hidden;
}

/* ─── BACKGROUND GRID ─── */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(200,180,160,0.12) 1px, transparent 1px),
    linear-gradient(90deg, rgba(200,180,160,0.12) 1px, transparent 1px);
  background-size: 32px 32px;
  pointer-events: none;
  z-index: 0;
}

.content { position: relative; z-index: 1; }

/* ─── HEADER ─── */
.header {
  background: var(--navy);
  padding: 30px 20px 24px;
  text-align: center;
  position: relative;
  overflow: hidden;
  border-bottom: 4px solid var(--coral);
}

.header::after {
  content: '';
  position: absolute;
  bottom: -2px; left: 0; right: 0; height: 6px;
  background: repeating-linear-gradient(
    90deg,
    var(--coral) 0px, var(--coral) 10px,
    transparent 10px, transparent 20px
  );
  opacity: 0.4;
}

.header h1 {
  font-family: 'Baloo 2', cursive;
  font-weight: 800;
  color: white;
  font-size: 2rem;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  text-shadow: 2px 2px 0 rgba(0,0,0,0.2);
  margin-bottom: 2px;
}

.header-sub {
  color: rgba(255,255,255,0.65);
  font-size: 0.78rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  font-weight: 600;
}

/* ─── STATS ROW ─── */
.stats-row {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
  padding: 16px 16px 0;
  max-width: 600px;
  margin: 0 auto;
}

.stat-card {
  background: var(--card-bg);
  border: 2px solid var(--border);
  border-radius: var(--r-md);
  padding: 14px 10px;
  text-align: center;
  box-shadow: var(--shadow);
}

.stat-num {
  font-family: 'Baloo 2', cursive;
  font-size: 2.2rem;
  font-weight: 800;
  line-height: 1;
  margin-bottom: 2px;
}
.stat-card.total .stat-num  { color: var(--navy); }
.stat-card.done  .stat-num  { color: var(--green); }
.stat-card.left  .stat-num  { color: var(--coral); }

.stat-label {
  font-size: 0.68rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted);
}

/* ─── PROGRESS RING ─── */
.progress-section {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  padding: 16px;
  max-width: 600px;
  margin: 0 auto;
}

.ring-wrap {
  position: relative;
  width: 90px; height: 90px;
  flex-shrink: 0;
}
.ring-wrap svg { transform: rotate(-90deg); }
.ring-bg { fill: none; stroke: var(--border); stroke-width: 8; }
.ring-fill {
  fill: none;
  stroke: url(#ringGrad);
  stroke-width: 8;
  stroke-linecap: round;
  transition: stroke-dashoffset 0.6s cubic-bezier(.4,0,.2,1);
}
.ring-label {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  font-weight: 800;
  font-family: 'Baloo 2', cursive;
}
.ring-pct { font-size: 1.35rem; color: var(--navy); line-height: 1; }
.ring-sub  { font-size: 0.5rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }

.progress-msg { flex: 1; }
.progress-msg .msg-title {
  font-family: 'Baloo 2', cursive;
  font-size: 1.05rem;
  font-weight: 700;
  color: var(--navy);
  margin-bottom: 4px;
}
.progress-msg .msg-sub {
  font-size: 0.78rem;
  color: var(--muted);
  line-height: 1.5;
  font-weight: 500;
}

/* ─── MAIN ─── */
.main { padding: 0 14px; max-width: 600px; margin: 0 auto; }

/* ─── ADD CARD ─── */
.add-card {
  background: var(--card-bg);
  border: 2px solid var(--border);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow);
  margin: 14px 0;
  overflow: hidden;
}

.add-toggle {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 15px 18px;
  cursor: pointer;
  background: rgba(196,96,122,0.04);
  user-select: none;
}
.add-toggle .icon-wrap {
  width: 34px; height: 34px;
  background: var(--navy);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  font-size: 1.2rem;
  color: white;
  font-weight: 700;
}
.add-toggle .label { font-weight: 700; font-size: 0.92rem; color: var(--navy); flex: 1; }
.add-toggle .chevron { color: var(--muted); font-size: 0.75rem; transition: transform 0.25s; }
.add-toggle.open .chevron { transform: rotate(180deg); }

.add-form {
  display: none;
  padding: 0 18px 18px;
  flex-direction: column;
  gap: 12px;
}
.add-form.open { display: flex; }

.field-group { display: flex; flex-direction: column; gap: 5px; }
.field-label {
  font-size: 0.7rem;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  padding-left: 2px;
}

input[type="text"] {
  border: 2px solid var(--border);
  border-radius: var(--r-sm);
  font-family: 'Baloo 2', cursive;
  font-size: 0.95rem;
  outline: none;
  padding: 11px 15px;
  transition: border-color 0.2s, box-shadow 0.2s;
  width: 100%;
  background: white;
  color: var(--text);
  -webkit-appearance: none;
}
input[type="text"]::placeholder { color: #C4B4A4; }
input[type="text"]:focus {
  border-color: var(--navy);
  box-shadow: 0 0 0 4px rgba(196,96,122,0.10);
}

.btn-add {
  background: var(--navy);
  border: none;
  border-radius: var(--r-sm);
  color: white;
  cursor: pointer;
  font-family: 'Baloo 2', cursive;
  font-size: 0.97rem;
  font-weight: 700;
  min-height: 48px;
  padding: 11px;
  transition: opacity 0.2s, transform 0.15s;
  width: 100%;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  box-shadow: 0 4px 14px rgba(196,96,122,0.25);
}
.btn-add:active { opacity: 0.88; transform: scale(0.97); }

/* ─── SEARCH ─── */
.search-wrap { position: relative; margin-bottom: 10px; }
.search-icon {
  position: absolute; left: 14px; top: 50%;
  transform: translateY(-50%);
  font-size: 0.95rem; pointer-events: none; color: var(--muted);
}
#searchInput { padding-left: 40px; }

/* ─── FILTER TABS ─── */
.filter-tabs {
  display: flex; gap: 8px; margin-bottom: 14px;
  overflow-x: auto; padding-bottom: 2px;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.filter-tabs::-webkit-scrollbar { display: none; }

.filter-tab {
  background: white;
  border: 2px solid var(--border);
  border-radius: 50px;
  color: var(--navy);
  cursor: pointer;
  font-family: 'Baloo 2', cursive;
  font-size: 0.8rem;
  font-weight: 700;
  padding: 7px 16px;
  white-space: nowrap;
  transition: all 0.2s;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.filter-tab.active {
  background: var(--navy);
  border-color: var(--navy);
  color: white;
  box-shadow: 0 4px 12px rgba(196,96,122,0.25);
}

/* ─── THEME SECTION ─── */
.theme-section { margin-bottom: 18px; }

.theme-header {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 8px; padding: 0 4px;
}

.theme-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}

.theme-title {
  font-family: 'Baloo 2', cursive;
  font-size: 1.05rem;
  font-weight: 800;
  color: var(--navy);
  flex: 1;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

.theme-badge {
  background: var(--navy);
  border-radius: 50px;
  color: white;
  font-size: 0.7rem;
  font-weight: 700;
  padding: 3px 10px;
  letter-spacing: 0.04em;
}

.theme-card {
  background: var(--card-bg);
  border: 2px solid var(--border);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow);
  overflow: hidden;
}

/* ─── CHAPTER ITEM ─── */
.chapter-item {
  display: flex;
  align-items: center;
  gap: 12px;
  min-height: 54px;
  padding: 10px 14px;
  border-bottom: 1.5px solid rgba(200,180,160,0.3);
  transition: background 0.15s;
  position: relative;
}
.chapter-item:last-child { border-bottom: none; }
.chapter-item:active { background: rgba(196,96,122,0.04); }
.chapter-item.is-done {
  background: rgba(76,175,130,0.04);
}

/* Custom checkbox */
.custom-cb {
  width: 26px; height: 26px;
  border-radius: 8px;
  border: 2px solid var(--border);
  background: white;
  flex-shrink: 0;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
  position: relative;
}
.custom-cb.checked {
  background: linear-gradient(135deg, var(--green), #3CB870);
  border-color: transparent;
  box-shadow: 0 3px 10px rgba(76,175,130,0.4);
}
.custom-cb.checked::after {
  content: '';
  width: 6px; height: 11px;
  border: 2.5px solid white;
  border-top: none; border-left: none;
  transform: rotate(42deg) translate(-1px,-1px);
  display: block;
}
.chapter-item input[type="checkbox"] { display: none; }

.chapter-name {
  flex: 1;
  font-size: 0.9rem;
  line-height: 1.4;
  color: var(--text);
  font-weight: 500;
  transition: color 0.2s;
  word-break: break-word;
}
.chapter-name.done {
  color: var(--muted);
  text-decoration: line-through;
  text-decoration-color: rgba(138,122,106,0.5);
}

.chapter-edit-input {
  flex: 1;
  border: 2px solid var(--navy);
  border-radius: 8px;
  font-family: 'Baloo 2', cursive;
  font-size: 0.88rem;
  padding: 6px 10px;
  outline: none;
  background: white;
  color: var(--text);
  box-shadow: 0 0 0 4px rgba(196,96,122,0.10);
}

.btn-actions {
  display: flex; gap: 4px; flex-shrink: 0;
}

.btn-icon {
  background: none;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 1rem;
  width: 34px; height: 34px;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s, transform 0.1s;
  color: var(--muted);
}
.btn-icon:active { transform: scale(0.9); }
.btn-icon.edit:active  { background: rgba(196,96,122,0.10); }
.btn-icon.save  { color: var(--green); }
.btn-icon.save:active  { background: rgba(76,175,130,0.12); }
.btn-icon.cancel { color: #999; }
.btn-icon.del:active   { background: rgba(224,90,90,0.10); }
.btn-icon.del { color: #C9A0A0; }

/* ─── TOAST ─── */
.toast {
  position: fixed;
  bottom: 28px; left: 50%;
  transform: translateX(-50%) translateY(90px);
  background: var(--navy);
  color: white;
  padding: 13px 22px;
  border-radius: 50px;
  font-family: 'Baloo 2', cursive;
  font-size: 0.87rem;
  font-weight: 600;
  z-index: 9999;
  transition: transform 0.35s cubic-bezier(.34,1.56,.64,1);
  white-space: nowrap;
  box-shadow: 0 10px 40px rgba(0,0,0,0.2);
  pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* ─── EMPTY ─── */
.empty {
  text-align: center; padding: 50px 20px; color: var(--muted);
}
.empty .search-big { font-size: 2.5rem; margin-bottom: 10px; }
.empty p { font-size: 0.9rem; line-height: 1.6; font-weight: 500; }

/* ─── CONGRATS BANNER ─── */
.congrats-banner {
  background: linear-gradient(135deg, var(--green), #3CB870);
  border-radius: var(--r-md);
  color: white;
  font-weight: 700;
  font-family: 'Baloo 2', cursive;
  font-size: 0.92rem;
  padding: 14px 18px;
  text-align: center;
  margin-bottom: 14px;
  box-shadow: 0 6px 24px rgba(76,175,130,0.3);
  display: none;
  letter-spacing: 0.03em;
}
.congrats-banner.show { display: block; }

/* ─── DIVIDER ─── */
.divider {
  border: none;
  border-top: 2px dashed var(--border);
  margin: 4px 0 12px;
}

/* ─── RESPONSIVE ─── */
@media (max-width: 360px) {
  .header h1 { font-size: 1.6rem; }
  .stat-num { font-size: 1.8rem; }
}
</style>
</head>
<body>

<div class="content">

  <!-- HEADER -->
  <header class="header">
    <h1>Ma Révision Médicale</h1>
    <div class="header-sub">Tableau de bord · 4ème année 2025/2026</div>
  </header>

  <!-- STATS ROW -->
  <div class="stats-row">
    <div class="stat-card total">
      <div class="stat-num" id="statTotal">0</div>
      <div class="stat-label">Total</div>
    </div>
    <div class="stat-card done">
      <div class="stat-num" id="statDone">0</div>
      <div class="stat-label">Révisés</div>
    </div>
    <div class="stat-card left">
      <div class="stat-num" id="statLeft">0</div>
      <div class="stat-label">Restants</div>
    </div>
  </div>

  <!-- PROGRESS RING -->
  <div class="progress-section">
    <div class="ring-wrap">
      <svg viewBox="0 0 90 90" width="90" height="90">
        <defs>
          <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%"   stop-color="#E05A5A"/>
            <stop offset="100%" stop-color="#C4607A"/>
          </linearGradient>
        </defs>
        <circle class="ring-bg" cx="45" cy="45" r="37"/>
        <circle class="ring-fill" id="ringFill" cx="45" cy="45" r="37"
          stroke-dasharray="232.5"
          stroke-dashoffset="232.5"/>
      </svg>
      <div class="ring-label">
        <span class="ring-pct" id="ringPct">0%</span>
        <span class="ring-sub">Avancement</span>
      </div>
    </div>
    <div class="progress-msg">
      <div class="msg-title" id="motivMsg">C'est parti !</div>
      <div class="msg-sub" id="motivSub">Commence à cocher tes chapitres révisés.</div>
    </div>
  </div>

  <!-- MAIN -->
  <main class="main">

    <!-- CONGRATS -->
    <div class="congrats-banner" id="congratsBanner">
      Bravo ! Tu as révisé tous les chapitres !
    </div>

    <!-- ADD FORM -->
    <div class="add-card">
      <div class="add-toggle" id="addToggle" onclick="toggleAddForm()">
        <div class="icon-wrap">+</div>
        <span class="label">Ajouter un chapitre</span>
        <span class="chevron">▼</span>
      </div>
      <div class="add-form" id="addForm">
        <div class="field-group">
          <div class="field-label">Nom du chapitre</div>
          <input type="text" id="chapterName" placeholder="ex : Insuffisance cardiaque">
        </div>
        <div class="field-group">
          <div class="field-label">Thème / Spécialité</div>
          <input type="text" id="chapterTheme" list="themeList" placeholder="ex : Cardiologie">
          <datalist id="themeList"></datalist>
        </div>
        <button class="btn-add" onclick="addChapter()">Ajouter le chapitre</button>
      </div>
    </div>

    <!-- SEARCH -->
    <div class="search-wrap">
      <span class="search-icon">&#128269;</span>
      <input type="text" id="searchInput" placeholder="Rechercher un chapitre ou un thème…" oninput="renderAll()">
    </div>

    <!-- FILTER TABS -->
    <div class="filter-tabs">
      <button class="filter-tab active" onclick="setFilter('all',this)">Tous</button>
      <button class="filter-tab" onclick="setFilter('todo',this)">A réviser</button>
      <button class="filter-tab" onclick="setFilter('done',this)">Révisés</button>
    </div>

    <!-- LIST -->
    <div id="chapterList"></div>

  </main>
</div>

<div class="toast" id="toast"></div>

// ── STATE ──
const STORAGE_KEY = 'medicalRevisionData_v2';
let chapters = [];
let activeFilter = 'all';
let editingId = null;

// ── UTILS ──
function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2,7);
}
function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(chapters));
}
function load() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (raw) { try { chapters = JSON.parse(raw); return; } catch(e){} }
  chapters = defaultChapters.map(c => ({...c, id: uid()}));
  save();
}

// ── TOAST ──
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2400);
}

// ── FILTER ──
function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderAll();
}

// ── ADD FORM TOGGLE ──
function toggleAddForm() {
  const toggle = document.getElementById('addToggle');
  const form   = document.getElementById('addForm');
  toggle.classList.toggle('open');
  form.classList.toggle('open');
  if (form.classList.contains('open')) {
    setTimeout(() => document.getElementById('chapterName').focus(), 100);
  }
}

// ── DATALIST ──
function updateThemeList() {
  const themes = [...new Set(chapters.map(c => c.theme))].sort();
  document.getElementById('themeList').innerHTML =
    themes.map(t => `<option value="${t}">`).join('');
}

// ── ADD ──
function addChapter() {
  const nameEl  = document.getElementById('chapterName');
  const themeEl = document.getElementById('chapterTheme');
  const name    = nameEl.value.trim();
  const theme   = themeEl.value.trim();

  if (!name) {
    nameEl.style.borderColor = '#E05A5A';
    nameEl.focus();
    setTimeout(() => nameEl.style.borderColor = '', 1600);
    showToast('Entre le nom du chapitre');
    return;
  }
  if (!theme) {
    themeEl.style.borderColor = '#E05A5A';
    themeEl.focus();
    setTimeout(() => themeEl.style.borderColor = '', 1600);
    showToast('Entre le thème');
    return;
  }

  chapters.push({ id: uid(), name, theme, checked: false });
  save();
  renderAll();
  showToast('"' + name + '" ajouté dans ' + theme);
  nameEl.value = '';
  themeEl.value = '';
  nameEl.focus();
}

// ── TOGGLE CHECKED ──
function toggleChapter(id) {
  const ch = chapters.find(c => c.id === id);
  if (ch) { ch.checked = !ch.checked; save(); renderAll(); }
}

// ── EDIT ──
function startEdit(id) {
  editingId = id;
  renderAll();
  const inp = document.getElementById('edit_' + id);
  if (inp) { inp.focus(); inp.select(); }
}

function saveEdit(id) {
  const inp = document.getElementById('edit_' + id);
  if (!inp) return;
  const newName = inp.value.trim();
  if (!newName) { showToast('Le nom ne peut pas être vide'); inp.focus(); return; }
  const ch = chapters.find(c => c.id === id);
  if (ch) { ch.name = newName; save(); showToast('Chapitre modifié'); }
  editingId = null;
  renderAll();
}

function cancelEdit() {
  editingId = null;
  renderAll();
}

// ── DELETE ──
function deleteChapter(id) {
  const ch = chapters.find(c => c.id === id);
  chapters = chapters.filter(c => c.id !== id);
  save();
  renderAll();
  if (ch) showToast('"' + ch.name + '" supprimé');
}

// ── MOTIVATION MESSAGE ──
function motivText(pct) {
  if (pct === 0)   return ["C'est parti !", "Commence à cocher tes chapitres révisés."];
  if (pct < 25)    return ["Belle entrée en matière", "Tu as bien démarré, continue !"];
  if (pct < 50)    return ["Bon rythme !", "Tu es sur la bonne voie, continue comme ça."];
  if (pct < 75)    return ["Plus de la moitié !", "Tu avances vraiment bien, bravo !"];
  if (pct < 100)   return ["Presque fini !", "Plus que quelques chapitres, courage !"];
  return ["Objectif atteint !", "Tu as tout révisé. Excellente préparation !"];
}

// ── THEME COLOR ──
const THEME_COLORS = ['#E05A5A','#C4607A','#F0A0B0','#4CAF82','#E67E22','#8E44AD','#C0392B','#16A085'];
let themeColorMap = {};
let colorIdx = 0;
function themeColor(theme) {
  if (!themeColorMap[theme]) {
    themeColorMap[theme] = THEME_COLORS[colorIdx % THEME_COLORS.length];
    colorIdx++;
  }
  return themeColorMap[theme];
}

// ── RENDER ──
function renderAll() {
  updateThemeList();

  const total = chapters.length;
  const done  = chapters.filter(c => c.checked).length;
  const left  = total - done;
  const pct   = total ? Math.round(done / total * 100) : 0;

  document.getElementById('statTotal').textContent = total;
  document.getElementById('statDone').textContent  = done;
  document.getElementById('statLeft').textContent  = left;

  const circum = 2 * Math.PI * 37;
  const offset = circum - (pct / 100) * circum;
  document.getElementById('ringFill').style.strokeDashoffset = offset;
  document.getElementById('ringPct').textContent = pct + '%';

  const [title, sub] = motivText(pct);
  document.getElementById('motivMsg').textContent = title;
  document.getElementById('motivSub').textContent = sub;

  document.getElementById('congratsBanner').classList.toggle('show', pct === 100 && total > 0);

  const q = document.getElementById('searchInput').value.toLowerCase();
  const visible = chapters.filter(c => {
    if (activeFilter === 'done' && !c.checked)  return false;
    if (activeFilter === 'todo' && c.checked)   return false;
    if (q && !c.name.toLowerCase().includes(q) && !c.theme.toLowerCase().includes(q)) return false;
    return true;
  });

  const groups = {};
  visible.forEach(c => { if (!groups[c.theme]) groups[c.theme] = []; groups[c.theme].push(c); });

  const container = document.getElementById('chapterList');

  if (!Object.keys(groups).length) {
    container.innerHTML = `<div class="empty"><div class="search-big">&#128269;</div><p>Aucun chapitre trouvé.<br>Essaie un autre filtre ou une autre recherche.</p></div>`;
    return;
  }

  container.innerHTML = Object.keys(groups).sort().map(theme => {
    const items      = groups[theme];
    const themeDone  = items.filter(c => c.checked).length;
    const color      = themeColor(theme);

    const rows = items.map(c => {
      const isEditing = editingId === c.id;

      if (isEditing) {
        return `
          <div class="chapter-item">
            <div class="custom-cb ${c.checked ? 'checked' : ''}" onclick="toggleChapter('${c.id}')"></div>
            <input class="chapter-edit-input" id="edit_${c.id}"
              value="${c.name.replace(/"/g,'&quot;')}"
              onkeydown="if(event.key==='Enter')saveEdit('${c.id}');if(event.key==='Escape')cancelEdit()">
            <div class="btn-actions">
              <button class="btn-icon save" onclick="saveEdit('${c.id}')" title="Enregistrer">&#10004;</button>
              <button class="btn-icon cancel" onclick="cancelEdit()" title="Annuler">&#10005;</button>
            </div>
          </div>`;
      }

      return `
        <div class="chapter-item ${c.checked ? 'is-done' : ''}">
          <div class="custom-cb ${c.checked ? 'checked' : ''}" onclick="toggleChapter('${c.id}')"></div>
          <span class="chapter-name ${c.checked ? 'done' : ''}">${c.name}</span>
          <div class="btn-actions">
            <button class="btn-icon edit" onclick="startEdit('${c.id}')" title="Modifier">✏️</button>
            <button class="btn-icon del"  onclick="deleteChapter('${c.id}')" title="Supprimer">🗑️</button>
          </div>
        </div>`;
    }).join('');

    return `
      <div class="theme-section">
        <div class="theme-header">
          <div class="theme-dot" style="background:${color}"></div>
          <span class="theme-title">${theme}</span>
          <span class="theme-badge">${themeDone}/${items.length}</span>
        </div>
        <div class="theme-card">${rows}</div>
      </div>`;
  }).join('');
}

// ── INIT ──
load();
renderAll();

document.getElementById('chapterName').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('chapterTheme').focus();
});
document.getElementById('chapterTheme').addEventListener('keydown', e => {
  if (e.key === 'Enter') addChapter();
});
</script>
